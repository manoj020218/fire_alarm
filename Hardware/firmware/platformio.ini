; ============================================================
; FireGuard Gateway Firmware — Vajruino VVM401 (ESP32 classic)
; PlatformIO 6.1.19 — board = esp32dev
; ============================================================
[env:fireguard]
platform  = espressif32
board     = esp32dev
framework = arduino

; Custom 4 MB partition table (nvs + otadata + ota_0 + ota_1 + coredump)
board_build.partitions = partitions_fireguard.csv

; Monitor
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time

; Compiler flags
build_flags =
    -D ARDUINO_ARCH_ESP32
    -D MQTT_MAX_PACKET_SIZE=1024
    -D TINY_GSM_MODEM_SIM7600
    -D TINY_GSM_RX_BUFFER=1024
    -D CONFIG_BOOTLOADER_APP_ROLLBACK_ENABLE=1
    -D PIO_FRAMEWORK_ARDUINO_LWIP_HIGHER_BANDWIDTH
    -D ELEGANTOTA_USE_ASYNC_WEBSERVER=1
    ; Silence verbose TinyGSM debug in production builds
    ; -D TINY_GSM_DEBUG=Serial

; Upload (OTA in field; bench: external USB-TTL on J1/J2 jumper dance)
; upload_port = COM12
; upload_speed = 921600

; ---------------------------------------------------------------
; Library dependencies (pinned versions for 10-year reproducibility)
; ---------------------------------------------------------------
lib_deps =
    vshymanskyy/TinyGSM
    arduino-libraries/Ethernet@^2
    arduino-libraries/ArduinoHttpClient@^0.6
    knolleary/PubSubClient
    bblanchon/ArduinoJson@^6
    adafruit/RTClib
    4-20ma/ModbusMaster
    ESP32Async/ESPAsyncWebServer
    ESP32Async/AsyncTCP
    ayushsharma82/ElegantOTA@^3

; Extra include paths
build_src_filter = +<*> -<.git/>
